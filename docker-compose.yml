# LOCAL dev infra: postgres + redis + kong (DB-less).
# แอป api/web รันบน host ด้วย `pnpm dev` แล้ว Kong route /api -> host.docker.internal:3005
services:
  postgres:
    image: postgres:17-alpine
    container_name: medium_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medium}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medium}
      POSTGRES_DB: ${POSTGRES_DB:-medium}
    ports:
      - "5433:5432" # host 5433 (เลี่ยงชนกับ postgres ตัวอื่นบนเครื่อง)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-medium} -d ${POSTGRES_DB:-medium}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: medium_redis
    restart: unless-stopped
    ports:
      - "6380:6379" # host 6380 (เลี่ยงชนกับ redis ตัวอื่นบนเครื่อง)
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  kong:
    image: kong:3.9
    container_name: medium_kong
    restart: unless-stopped
    depends_on:
      - redis
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_LOG_LEVEL: info
    ports:
      - "8000:8000" # proxy (เว็บเรียกผ่านตรงนี้)
      - "8001:8001" # admin API
    volumes:
      - ./infra/kong/kong.local.yml:/kong/kong.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata:
