_format_version: "3.0"
_transform: true

services:
  - name: medium-api
    # ใน prod compose api เป็น service ใน docker network เดียวกัน
    url: http://api:3005
    routes:
      - name: api-route
        paths:
          - /api
        strip_path: true
    plugins:
      - name: cors
        config:
          # จำกัดเฉพาะ origin ของเว็บ (ไม่ใช้ * — เปลี่ยนเป็นโดเมนจริงตอน deploy)
          origins:
            - http://localhost:3006
          methods:
            - GET
            - POST
            - PATCH
            - PUT
            - DELETE
            - OPTIONS
          headers:
            - Accept
            - Authorization
            - Content-Type
            - Origin
          exposed_headers:
            - X-RateLimit-Remaining-Minute
          credentials: false
          max_age: 3600
      - name: rate-limiting
        config:
          minute: 300
          policy: redis
          redis:
            host: redis
            port: 6379
          fault_tolerant: true
          hide_client_headers: false
